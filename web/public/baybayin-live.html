<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baybayin INT8 Inference</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <style>
        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            /* Forces the container to be a perfect square */
            background-color: #000;
            /* Optional: adds a black background while loading */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Ensures the video fills the square container */
        }
    </style>
</head>

<body>
    <h1>Baybayin INT8 Inference</h1>

    <p>
        <span>Select INT8 Model: </span>
        <select id="selected-model">
            <option default="true" value="baybayin-yolo-model-int8-nano-4">Nano ¼ (smallest, ~1.8MB)</option>
            <option value="baybayin-yolo-model-int8-nano-2">Nano ½</option>
            <option value="baybayin-yolo-model-int8-nano">Nano</option>
            <option value="baybayin-yolo-model-int8-small">Small (largest, ~20MB)</option>
        </select>
    </p>

    <div class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output-canvas"></canvas>
    </div>

    <script>
        const modelSelect = document.getElementById('selected-model');
        modelSelect.addEventListener('change', function() {
            const selectedValue = this.value;
            const baseUrl = `/baybayin-live`; 
            window.location.href = `${baseUrl}?selected_model=${encodeURIComponent(selectedValue)}`;
        });

        const urlParams = new URLSearchParams(window.location.search);
        const selectedModel = urlParams.get('selected_model');
        if (selectedModel) {
            modelSelect.value = selectedModel;
        }
    </script>

    <script>
        const MODEL_DIM = 640;
        const CONFIDENCE_THRESHOLD = 0.25;

        // Updated to your 59 Baybayin classes
        const CLASSES = [
            "a", "b", "ba", "be_bi", "bo_bu", "d", "da", "de_di", "do_du", "e_i",
            "g", "ga", "ge_gi", "go_gu", "h", "ha", "he_hi", "ho_hu", "k", "ka",
            "ke_ki", "ko_ku", "l", "la", "le_li", "lo_lu", "m", "ma", "me_mi", "mo_mu",
            "n", "na", "ne_ni", "ng", "nga", "nge_ngi", "ngo_ngu", "no_nu", "o_u", "p",
            "pa", "pe_pi", "po_pu", "s", "sa", "se_si", "so_su", "t", "ta", "te_ti",
            "to_tu", "w", "wa", "we_wi", "wo_wu", "y", "ya", "ye_yi", "yo_yu"
        ];

        // Dynamically generate a distinct color for each of the 59 classes using HSL
        /*const COLORS = CLASSES.map((_, index) => {
            const hue = Math.floor((index * 360) / CLASSES.length);
            return `hsl(${hue}, 80%, 50%)`;
        });*/
        // Use all white background
        const COLORS = CLASSES.map((_, index) => {
            const hue = Math.floor((index * 360) / CLASSES.length);
            return `white`;
        });

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');

        let model;
        let activeBoxes = []; // Will store the latest predictions to share with the render loop

        async function init() {
            try {
                model = await tf.loadGraphModel(`./${modelSelect.value}/model.json`);
                await setupCamera();
                video.play();

                // Start both loops concurrently
                renderLoop();      // 60 FPS Video rendering
                inferenceLoop();   // Throttled AI Inference

            } catch (error) {
                console.error("Error initializing:", error);
            }
        }

        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    width: { ideal: 640 },
                    height: { ideal: 640 },
                    aspectRatio: { ideal: 1 }, // Instructs the browser to provide a 1:1 square feed
                    facingMode: 'environment'
                },
                audio: false
            });

            video.srcObject = stream;

            return new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    // Update the fallback height from 480 to 640
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 640;
                    resolve(video);
                };
            });
        }

        // --- RENDER VIDEO & BOXES ---
        // Runs as fast as the browser allows (smooth video stream)
        function renderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // We no longer draw video on canvas if video element is visible underneath.
            // If you hide the video element, uncomment the line below.
            // ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            activeBoxes.forEach(box => {
                const maxCoord = Math.max(Math.abs(box.x1), Math.abs(box.y1), Math.abs(box.x2), Math.abs(box.y2));
                const isNormalized = maxCoord <= 2.0;

                const scaleX = isNormalized ? canvas.width : (canvas.width / MODEL_DIM);
                const scaleY = isNormalized ? canvas.height : (canvas.height / MODEL_DIM);

                let renderX, renderY, renderW, renderH;

                const x1 = box.x1 * scaleX;
                const y1 = box.y1 * scaleY;
                const x2 = box.x2 * scaleX;
                const y2 = box.y2 * scaleY;

                renderX = Math.min(x1, x2);
                renderY = Math.min(y1, y2);
                renderW = Math.abs(x2 - x1);
                renderH = Math.abs(y2 - y1);

                // Draw Box
                const color = COLORS[box.classId] || "#FFFFFF";
                ctx.strokeStyle = color;
                ctx.lineWidth = 4;
                ctx.strokeRect(renderX, renderY, renderW, renderH);

                // Draw Label
                //const label = `${CLASSES[box.classId]} ${(box.score * 100).toFixed(1)}%`;
                const label = `${CLASSES[box.classId]}`;
                ctx.fillStyle = color;
                // Set font size
                ctx.font = "bold 14px sans-serif";
                // Draw the background banner (matching the exact width of the box)
                const labelHeight = 20;
                ctx.fillRect(renderX, renderY - labelHeight, renderW, labelHeight);
                // CENTER THE TEXT
                ctx.fillStyle = "#000000"; // Black text
                ctx.textAlign = "center";  // Align text relative to its X coordinate
                // Calculate the horizontal midpoint of the bounding box
                const centerX = renderX + (renderW / 2);
                // Draw the text at the center point
                ctx.fillText(label, centerX, renderY - 6);
                // Reset alignment back to "left" so it doesn't break other text rendering later
                ctx.textAlign = "left";
            });

            requestAnimationFrame(renderLoop);
        }

        // --- THROTTLED INFERENCE ---
        // Executes, updates boxes, and then waits 250ms before doing it again
        async function inferenceLoop() {
            let inputTensor, predictions;

            try {
                // Grab frame, Normalize (/ 255.0)
                inputTensor = tf.tidy(() => {
                    let img = tf.browser.fromPixels(video).resizeBilinear([MODEL_DIM, MODEL_DIM]);
                    img = img.div(255.0);
                    return img.expandDims(0);
                });

                let rawOutput = model.execute(inputTensor);
                predictions = Array.isArray(rawOutput) ? rawOutput[0] : rawOutput;

                const shape = predictions.shape;
                const data = await predictions.data();

                let boxes = [];

                // Extract Coordinates
                if (shape.length === 3 && shape[2] === 6) {
                    for (let i = 0; i < shape[1]; i++) {
                        const offset = i * 6;
                        const score = data[offset + 4];
                        if (score > CONFIDENCE_THRESHOLD) {
                            boxes.push({
                                x1: data[offset], y1: data[offset + 1],
                                x2: data[offset + 2], y2: data[offset + 3],
                                score: score, classId: Math.round(data[offset + 5])
                            });
                        }
                    }
                }
                // STANDARD YOLO OUTPUT (Coordinates + 59 Classes)
                else if (shape.length === 3 && shape[1] === (4 + CLASSES.length)) {
                    const numAnchors = shape[2];
                    for (let i = 0; i < numAnchors; i++) {
                        let localMaxScore = 0;
                        let classId = -1;
                        // Dynamically loop over all 59 classes based on CLASSES.length
                        for (let c = 0; c < CLASSES.length; c++) {
                            const score = data[(4 + c) * numAnchors + i];
                            if (score > localMaxScore) { localMaxScore = score; classId = c; }
                        }
                        if (localMaxScore > CONFIDENCE_THRESHOLD) {
                            const cx = data[0 * numAnchors + i];
                            const cy = data[1 * numAnchors + i];
                            const w = data[2 * numAnchors + i];
                            const h = data[3 * numAnchors + i];
                            boxes.push({
                                x1: cx - w / 2, y1: cy - h / 2,
                                x2: cx + w / 2, y2: cy + h / 2,
                                score: localMaxScore, classId: classId
                            });
                        }
                    }
                    if (boxes.length > 0) {
                        const tfBoxes = tf.tensor2d(boxes.map(b => [b.y1, b.x1, b.y2, b.x2]));
                        const tfScores = tf.tensor1d(boxes.map(b => b.score));
                        const nmsIndices = await tf.image.nonMaxSuppressionAsync(tfBoxes, tfScores, 50, 0.45, CONFIDENCE_THRESHOLD);
                        const indices = await nmsIndices.data();
                        boxes = Array.from(indices).map(idx => boxes[idx]);
                        tf.dispose([tfBoxes, tfScores, nmsIndices]);
                    }
                }

                // Push new predictions to shared array
                activeBoxes = boxes;

            } catch (err) {
                console.error("Inference Error:", err);
            } finally {
                // Safely clean up Tensors
                if (inputTensor) inputTensor.dispose();
                if (predictions) predictions.dispose();
            }

            // WAIT at least 250ms before doing the next frame inference 
            setTimeout(inferenceLoop, 250);
        }

        init();
    </script>
</body>

</html>
